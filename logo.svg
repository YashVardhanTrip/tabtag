<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF595E"/>
      <stop offset="25%" stop-color="#FFCA3A"/>
      <stop offset="50%" stop-color="#8AC926"/>
      <stop offset="75%" stop-color="#1982C4"/>
      <stop offset="100%" stop-color="#6A4C93"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" rx="20" fill="url(#bg)"/>

  <!-- Terminal window chrome -->
  <rect x="60" y="40" width="480" height="170" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="60" y="40" width="480" height="32" rx="12" fill="#161b22"/>
  <rect x="60" y="60" width="480" height="12" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="82" cy="56" r="6" fill="#FF5F57"/>
  <circle cx="100" cy="56" r="6" fill="#FEBC2E"/>
  <circle cx="118" cy="56" r="6" fill="#28C840"/>

  <!-- Tab bar -->
  <rect x="60" y="72" width="480" height="30" fill="#0d1117"/>

  <!-- Tabs -->
  <rect x="62" y="74" width="90" height="28" rx="6" ry="6" fill="#FF595E"/>
  <rect x="156" y="74" width="90" height="28" rx="6" ry="6" fill="#FFCA3A"/>
  <rect x="250" y="74" width="90" height="28" rx="6" ry="6" fill="#8AC926"/>
  <rect x="344" y="74" width="90" height="28" rx="6" ry="6" fill="#1982C4"/>
  <rect x="438" y="74" width="98" height="28" rx="6" ry="6" fill="#6A4C93"/>

  <!-- Tab text -->
  <text x="107" y="93" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="white" text-anchor="middle" font-weight="600">backend</text>
  <text x="201" y="93" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="white" text-anchor="middle" font-weight="600">api</text>
  <text x="295" y="93" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="white" text-anchor="middle" font-weight="600">recon</text>
  <text x="389" y="93" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="white" text-anchor="middle" font-weight="600">frontend</text>
  <text x="487" y="93" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="white" text-anchor="middle" font-weight="600">ssh-prod</text>

  <!-- Terminal content area -->
  <text x="80" y="130" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b949e">$</text>
  <text x="95" y="130" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#e6edf3">tabtag backend 1</text>
  <text x="80" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#FF595E">▊</text>
  <text x="95" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#FF595E">Tab tagged: backend</text>
  <text x="262" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b949e">(color #1)</text>
  <text x="80" y="180" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#8b949e">$</text>
  <rect x="88" y="170" width="8" height="16" fill="#e6edf3" opacity="0.7"/>

  <!-- Rainbow gradient line -->
  <rect x="100" y="240" width="400" height="3" rx="1.5" fill="url(#tagGrad)" filter="url(#glow)"/>

  <!-- "tabtag" branding -->
  <text x="300" y="278" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="36" fill="#e6edf3" text-anchor="middle" font-weight="800" letter-spacing="6">tabtag</text>
</svg>
